name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, and package
    runs-on: macos-26
    timeout-minutes: 30

    env:
      PROJECT: ChargingLimiter.xcodeproj
      SCHEME: ChargingLimiter
      DERIVED_DATA: ${{ github.workspace }}/.build/ci-derived-data
      APP_NAME: Charging Limiter.app
      ZIP_NAME: Charging-Limiter-macOS-arm64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show build environment
        run: |
          uname -m
          xcodebuild -version
          swift --version

      - name: Build Xcode project
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_BATCH_MODE=NO \
            build

      - name: Run unit tests
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:ChargingLimiterTests \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_BATCH_MODE=NO \
            test

      - name: Assemble Release app
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_BATCH_MODE=NO \
            build

      - name: Ad-hoc sign and verify app
        run: |
          app_path="$DERIVED_DATA/Build/Products/Release/$APP_NAME"
          daemon_plist="$app_path/Contents/Library/LaunchDaemons/com.yangyi.ChargingLimiter.daemon.plist"
          daemon_path="$app_path/Contents/Resources/ChargingLimiterDaemon"

          test -d "$app_path"
          test -f "$daemon_plist"
          test -x "$daemon_path"
          test "$(plutil -extract BundleProgram raw "$daemon_plist")" = \
            "Contents/Resources/ChargingLimiterDaemon"

          codesign --force --sign - \
            --identifier com.yangyi.ChargingLimiter.daemon \
            "$daemon_path"
          codesign --force --sign - "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          test "$(codesign -d --verbose=4 "$daemon_path" 2>&1 | \
            sed -n 's/^Identifier=//p')" = "com.yangyi.ChargingLimiter.daemon"

      - name: Create ZIP package
        run: |
          app_path="$DERIVED_DATA/Build/Products/Release/$APP_NAME"
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "artifacts/$ZIP_NAME"
          ditto -x -k "artifacts/$ZIP_NAME" /tmp/charging-limiter-package-check
          packaged_app="/tmp/charging-limiter-package-check/$APP_NAME"
          packaged_plist="$packaged_app/Contents/Library/LaunchDaemons/com.yangyi.ChargingLimiter.daemon.plist"
          packaged_daemon="$packaged_app/Contents/Resources/ChargingLimiterDaemon"

          test -f "$packaged_plist"
          test -x "$packaged_daemon"
          test "$(plutil -extract BundleProgram raw "$packaged_plist")" = \
            "Contents/Resources/ChargingLimiterDaemon"
          codesign --verify --deep --strict --verbose=2 "$packaged_app"
          test "$(codesign -d --verbose=4 "$packaged_daemon" 2>&1 | \
            sed -n 's/^Identifier=//p')" = "com.yangyi.ChargingLimiter.daemon"

      - name: Upload packaged app
        uses: actions/upload-artifact@v7
        with:
          name: Charging-Limiter-macOS-arm64
          path: artifacts/Charging-Limiter-macOS-arm64.zip
          if-no-files-found: error
          compression-level: 0
